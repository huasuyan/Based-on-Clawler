server:
  port: 9090
spring:
  datasource:
    url: jdbc:mysql://101.42.47.30:3306/web_crawler?useSSL=false&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: Web_crawler
    password: Web_crawler_database
    driver-class-name: com.mysql.cj.jdbc.Driver
  #Redis相关配置
  redis:
    host: 101.42.47.30
    port: 6379
    password: WebCrawlerRedis
    database: 0 #操作的是0号数据库(redis存在0-15号数据库（默认），在命令中使用select来切换)
    jedis:
      #Redis连接池配置
      pool:
        max-active: 8 #最大连接数
        max-wait: 1ms #连接池最大阻塞等待时间
        max-idle: 4 #连接池中的最大空闲连接
        min-idle: 0 #连接池中的最小空闲连接
# JWT配置
jwt:
  secret: WebCrawlerSecretMadeByChenQiPengAnMinHuJiaRong
  token-expiration: 86400     #token有效时间1天
  capcha-expiration: 60      #图片验证码有效时间60s
mybatis:
  configuration:
    map-underscore-to-camel-case: true


# 短信服务配置
sms:
  aliyun:
    host: https://gyytz.market.alicloudapi.com
    path: /sms/smsSend
    method: POST
    appcode: f73828f54e754318ab549e18357e713c # 请替换为实际的AppCode
    smsSignId: 2e65b1bb3d054466b82f0c9d125465e2 # 请替换为实际的短信签名ID
    templateId: 908e94ccf08b4476ba6c876d13f084ad # 请替换为实际的短信模板ID
    expireTime: 5 # 短信验证码过期时间（分）


xxl:
  job:
    admin:
      # xxl-job 控制台地址（改成你自己的）
      addresses: http://101.42.47.30:8081/xxl-job-admin
      # 令牌（默认 default_token，如果你没改就不用动）
      accessToken: default_token
    executor:
      # 【必须改】执行器名称，在 xxl-job 管理后台创建执行器时填的名字
      appname: web-crawler-xxl-job-test
      # 一般留空
      address:
      # 执行器 IP，留空自动获取本机 IP
      ip:
      # 执行器端口，不冲突即可
      port: 0
      # 日志路径
      logpath: /data/applogs/xxl-job/jobhandler
      # 日志保留天数
      logretentiondays: 30
